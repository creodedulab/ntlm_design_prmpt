        // ===== PROMPT PANEL (하단 패널) =====
        const PromptPanel = ({ template, onClose }) => {
          const [copied, setCopied] = useState(false);
          const prompt = generatePrompt(template);

          const handleCopy = () => {
            const textToCopy = prompt;
            let success = false;

            try {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                success = document.execCommand('copy');
                document.body.removeChild(textArea);
            } catch (err) {
                console.error('execCommand copy failed', err);
            }

            if (!success && navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy)
                    .then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    })
                    .catch((err) => {
                        console.error('Clipboard API failed', err);
                    });
                return;
            }

            if (success) {
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            }
          };

          return (
            <div className="fixed inset-0 z-50 bg-black/90 flex flex-col">
              <div className="flex items-center justify-between p-4 border-b border-zinc-800">
                <div className="flex items-center gap-3">
                  <div 
                    className="w-10 h-7 rounded border border-zinc-600"
                    style={{ backgroundColor: template.style.bg }}
                  />
                  <div>
                    <div className="text-sm font-bold text-white">{template.name}</div>
                    <div className="text-xs text-zinc-500">{template.category}</div>
                  </div>
                </div>
                <button
                  onClick={onClose}
                  className="w-10 h-10 rounded-full bg-zinc-800 text-white text-xl flex items-center justify-center hover:bg-zinc-700 transition"
                >
                  ✕
                </button>
              </div>

              <div className="flex-1 p-4 overflow-hidden">
                <textarea
                  readOnly
                  value={prompt}
                  className="w-full h-full bg-zinc-900 text-zinc-300 text-xs font-mono p-4 rounded-xl border border-zinc-700 resize-none focus:outline-none"
                  style={{ lineHeight: '1.6' }}
                />
              </div>

              <div className="p-4 border-t border-zinc-800">
                <button
                  onClick={handleCopy}
                  className={`w-full py-4 rounded-xl font-bold text-base flex items-center justify-center gap-2 transition-colors ${
                    copied ? 'bg-green-600 text-white' : 'bg-white text-black hover:bg-gray-200'
                  }`}
                >
                  {copied ? '✓ 복사됨!' : '📋 프롬프트 복사'}
                </button>
              </div>
            </div>
          );
        };

        // ===== MAIN APP =====
        function NotebookLMBuilder() {
          const [selectedCategory, setSelectedCategory] = useState('전체');
          const [selectedTemplate, setSelectedTemplate] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');

          const filteredTemplates = useMemo(() => {
            const filtered = TEMPLATES.filter(t => {
              const matchCategory = selectedCategory === '전체' || t.category === selectedCategory;
              const matchSearch = !searchQuery || t.name.toLowerCase().includes(searchQuery.toLowerCase()) || t.mood.toLowerCase().includes(searchQuery.toLowerCase());
              return matchCategory && matchSearch;
            });
            return filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko-KR'));
          }, [selectedCategory, searchQuery]);

          const categoryCount = useMemo(() => {
            const counts = { '전체': TEMPLATES.length };
            TEMPLATES.forEach(t => { counts[t.category] = (counts[t.category] || 0) + 1; });
            return counts;
          }, []);

          return (
            <div className="min-h-screen bg-zinc-950 text-white font-sans">
              <header className="sticky top-0 z-40 bg-zinc-950/90 backdrop-blur-md border-b border-zinc-800">
                <div className="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between gap-3">
                  <div className="font-bold text-xs sm:text-sm whitespace-nowrap shrink-0">
                    NotebookLM PPT Design Prompt
                  </div>
                  
                  <div className="hidden md:block w-full max-w-md px-4">
                    <div className="relative w-full">
                      <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                      <input type="text" placeholder="검색..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-1.5 bg-zinc-900 border border-zinc-800 rounded-lg text-sm focus:outline-none focus:border-violet-500 transition-colors" />
                    </div>
                  </div>

                  <div className="flex items-center gap-1.5 shrink-0">
                    <a href="https://notebooklm.google.com/" target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 px-3 py-1.5 bg-violet-600 text-white rounded-full text-xs font-bold hover:bg-violet-500 transition-colors">
                      <ExternalLink className="w-3 h-3 hidden sm:block" /> <span className="hidden sm:inline">NotebookLM 열기</span><span className="sm:hidden">열기</span>
                    </a>
                    <a href="https://www.slidedeckcleaner.com/" target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 px-3 py-1.5 bg-zinc-800 text-white rounded-full text-xs font-bold hover:bg-zinc-700 transition-colors">
                      <span>🧹</span> <span className="hidden sm:inline">워터마크 제거</span><span className="sm:hidden">제거</span>
                    </a>
                  </div>
                </div>
                
                <div className="md:hidden px-4 pb-3">
                  <div className="relative w-full">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                    <input type="text" placeholder="검색..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-1.5 bg-zinc-900 border border-zinc-800 rounded-lg text-sm focus:outline-none focus:border-violet-500 transition-colors" />
                  </div>
                </div>
              </header>

              <div className="max-w-7xl mx-auto px-4 mt-6 mb-4">
                <div className="flex flex-wrap gap-2">
                  {CATEGORIES.map(cat => (
                    <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-colors ${selectedCategory === cat ? 'bg-white text-black' : 'bg-zinc-900 text-zinc-400 hover:bg-zinc-800'}`}>
                      {cat} <span className="opacity-60 ml-1">{categoryCount[cat]}</span>
                    </button>
                  ))}
                </div>
              </div>

              <main className="max-w-7xl mx-auto px-4 pb-8">
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 sm:gap-4">
                  {filteredTemplates.map(template => (
                    <button key={template.id} onClick={() => setSelectedTemplate(template)} className="text-left group focus:outline-none">
                      <div className="transition-transform duration-200 group-hover:-translate-y-1 group-hover:shadow-lg shadow-black/50">
                        <StyleThumbnail template={template} />
                      </div>
                      <div className="mt-2 px-0.5">
                        <h3 className="text-xs font-bold text-white group-hover:text-violet-400 truncate transition-colors">{template.name}</h3>
                        <p className="text-[10px] text-zinc-500 truncate mt-0.5">{template.category}</p>
                      </div>
                    </button>
                  ))}
                </div>
                {filteredTemplates.length === 0 && (
                  <div className="text-center py-16">
                    <Grid3X3 className="w-10 h-10 text-zinc-700 mx-auto mb-3" />
                    <p className="text-zinc-500 text-sm">검색 결과가 없습니다</p>
                  </div>
                )}
              </main>

              {selectedTemplate && <PromptPanel template={selectedTemplate} onClose={() => setSelectedTemplate(null)} />}

              <style>{`
                .no-scrollbar::-webkit-scrollbar { display: none; }
                .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
              `}</style>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NotebookLMBuilder />);
    </script>
</body>
</html>
